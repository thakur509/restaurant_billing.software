<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Soham Bar and Restaurant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #fff5e6 0%, #ffe8cc 100%);
      margin: 0;
      font-family: 'Montserrat', Arial, sans-serif;
      color: #3e2f1c;
      min-height: 100vh;
    }
    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.9s;
      min-height: 100vh;
    }
    .screen.active { display: flex; }
    .logo-circle {
      background: #ffe5b4;
      border-radius: 50%;
      width: 140px;
      height: 140px;
      margin: 40px 0 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 32px #f7b26788;
      border: 4px solid #d5381e;
    }
    .logo-circle img {
      width: 100px;
      height: 100px;
      object-fit: cover;
    }
    .restro-title {
      text-align: center;
      color: #d5381e;
      font-size: 2.3em;
      letter-spacing: 2px;
      margin-bottom: 0;
      text-shadow: 1px 1px 3px
